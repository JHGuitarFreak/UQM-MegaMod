name: Build UQM Binaries

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
      with:
      sparse-checkout: |
        build
        src
    
    - name: Install Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libsdl2-dev \
          libpng-dev \
          libogg-dev \
          libvorbis-dev \
          zlib1g-dev
    
    - name: Build Linux Binary
      run: |
        chmod +x cmake-build.sh
        ./cmake-build.sh
    
    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v7
      with:
        name: UrQuanMastersDebug-Linux
        path: ./UrQuanMastersDebug
        if-no-files-found: error

  build-windows-32bit:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v6
      with:
      sparse-checkout: |
        build
        src

    - name: Setup MSYS2 for 32-bit
      uses: msys2/setup-msys2@v2
      with:
        update: true
        msystem: MINGW32
        install: >-
          base-devel
          mingw-w64-i686-toolchain
          mingw-w64-i686-cmake
          mingw-w64-i686-ninja
          mingw-w64-i686-SDL2
          mingw-w64-i686-libpng
          mingw-w64-i686-libogg
          mingw-w64-i686-libvorbis
          mingw-w64-i686-zlib
        cache: true
    
    - name: Build Windows 32-bit Binary
      shell: msys2 {0}
      run: ./cmake-build.sh
    
    - name: Upload Windows 32-bit Artifact
      uses: actions/upload-artifact@v7
      with:
        name: UrQuanMastersDebug-Windows
        path: ./UrQuanMastersDebug.exe
        if-no-files-found: error